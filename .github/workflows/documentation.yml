name: Build the latest documentation
on: # [push]
  push:
    branches:
      - main
jobs:
  build-and-push-doc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
        with:
          ref: gh-pages
      - name: Merge main -> gh-pages
        uses: devmasx/merge-branch@master
        with:
          type: now
          from_branch: main
          target_branch: gh-pages
          github_token: ${{ github.token }}
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.25"
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Install mlcg with cpu extra
        run: uv sync --extra cpu --group docs
        working-directory: ${{ github.workspace }}
      - name: Build Documentation
        run: uv run sphinx-build -b html ${{ github.workspace }}/docs/source ${{ github.workspace }}/docs/
      - name: Commit updated Doc
        uses: EndBug/add-and-commit@v7
        with:
          default_author: github_actions
          branch: gh-pages
          add: ${{ github.workspace }}/docs/*
          message: 'automatic update of the online doc'
          github_token: ${{ github.token }}

