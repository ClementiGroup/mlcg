ckpt_path: last
data:
  baseline_models: null
  h5_file_path: /group/ag_clementi_cmb/users/sayeg84/mlcg_benchmarking/grappa/2RVD_raw_dataset_bond_exc.h5
  loading_options:
    hdf_key_mapping:
      coords: cg_coords
      embeds: attrs:cg_embeds
      forces: cg_delta_forces
    nl_chkpts:
      2RVD: /group/ag_clementi_cmb/users/sayeg84/mlcg_benchmarking/grappa/2RVD_prior_nls_badn_min_pair_4.pt
  partition_options: ./partition.yaml
  transform_kbt: 0.59616108
  transform_noise_level: null
model:
  loss:
    class_path: mlcg.nn.Loss
    init_args:
      losses:
      - class_path: mlcg.nn.ForceMSE
        init_args:
          force_kwd: forces
  model:
    # previously SumOutWrapper before model.py step refactor
    class_path: mlcg.nn.gradients.SumOut
    init_args:
      targets:
        - forces
      models:
        grappa:
          # No GradientsOut wrapper needed - StandardGrappa computes forces internally
          # with retain_graph=True so SchNet can also compute gradients
          class_path: mlcg.nn.prior.grappa.grappa_wrappers.StandardGrappa
          init_args:
            h5_file_path: /group/ag_clementi_cmb/users/sayeg84/mlcg_benchmarking/grappa/2RVD_raw_dataset_bond_exc.h5
            molecule_name: 2RVD
            graph_node_features: 128
            gnn_width: 256
            gnn_attentional_layers: 2
            symmetriser_depth: 2
            n_periodicity_improper: 0 #experimental to avoid DDP error with not using impropers in grappa
        SchNet:
          class_path: mlcg.nn.GradientsOut
          init_args:
            targets: forces
            model:
              class_path: mlcg.nn.StandardSchNet
              init_args:
                hidden_channels: 128
                num_interactions: 2
                output_hidden_layer_widths:
                - 100
                - 60
                - 30
                activation:
                  class_path: torch.nn.Tanh
                  init_args: {}
                aggr: add
                cutoff:
                  class_path: mlcg.nn.CosineCutoff
                  init_args:
                    cutoff_lower: 0
                    cutoff_upper: 30
                rbf_layer:
                  class_path: mlcg.nn.ExpNormalBasis
                  init_args:
                    cutoff: 30
                    num_rbf: 64
                    trainable: false
optimizer:
  class_path: torch.optim.Adam
  init_args:
    lr: 0.0001
    weight_decay: 0
trainer:
  strategy: ddp_find_unused_parameters_true
  accelerator: gpu
  # devices: 1
  accumulate_grad_batches: 1
  benchmark: false
  callbacks:
  - class_path: pytorch_lightning.callbacks.LearningRateMonitor
    init_args:
      log_momentum: false
      logging_interval: epoch
  - class_path: pytorch_lightning.callbacks.model_checkpoint.ModelCheckpoint
    init_args:
      dirpath: default_root_dir
      every_n_epochs: 1
      filename: '{epoch}-{validation_loss:.4f}'
      monitor: validation_loss
      save_last: true
      save_top_k: -1
  check_val_every_n_epoch: 1
  default_root_dir: .
  detect_anomaly: false
  deterministic: false
  enable_checkpointing: true
  enable_model_summary: false
  enable_progress_bar: true
  fast_dev_run: false
  gradient_clip_algorithm: norm
  gradient_clip_val: 0
  log_every_n_steps: 500
  logger:
  - class_path: pytorch_lightning.loggers.TensorBoardLogger
    init_args:
      name: tensorboard
      save_dir: default_root_dir
      version: ''
  max_epochs: 20
  max_time: null
  precision: 32
  profiler: null
#  strategy: ddp
